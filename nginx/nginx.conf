events {}

http {
    server {
        listen 80;

        # Frontend
        location / {
            proxy_pass http://frontend:80;
        }

        # APIs
        location /api/users/ {
            proxy_pass http://user-service:8080/api/users/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/products/ {
            proxy_pass http://product-service:8080/api/products/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/orders/ {
            proxy_pass http://order-service:8080/api/orders/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}



# Problem	Result
# Wrong IP	Logs show container IP
# Wrong protocol	HTTPS redirect issues
# Missing host	Routing/auth fails
# No HTTP/1.1	Connection issues

# To forward original client request information like IP, host, and protocol to backend services when using a reverse proxy.